name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run tests
        working-directory: scholarzim
        run: mvn -B clean test

  flyway-smoke:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: scholarzim
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Flyway migration smoke test
        working-directory: scholarzim
        env:
          MYSQL_URL: jdbc:mysql://127.0.0.1:3306/scholarzim?useSSL=false&allowPublicKeyRetrieval=true
          MYSQL_USER: root
          MYSQL_PASSWORD: root
        run: mvn -B test -Dtest=FlywayMigrationIT,FlywaySpringBootIT,FlywayV10MigrationIT -Dspring.profiles.active=flyway-it
