<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Audit Log',
          'audit',
          '',
          '',
          'audit',
          ~{:: #audit-log-content}
      )}">
<body>
<th:block id="audit-log-content">

            <div th:replace="~{fragments/components :: dashboard-chrome(
                @{/admin/dashboard}, 'Dashboard',
                null, null,
                'Audit log',
                'Searchable record of platform actions')}"></div>
            <form class="row g-2 mb-4" method="get" th:action="@{/admin/audit-log}">
                <div class="col-md-5">
                    <input class="form-control" name="q" th:value="${query}" placeholder="Search actor, action, details…">
                </div>
                <div class="col-md-4">
                    <select class="form-select" name="action">
                        <option value="">All actions</option>
                        <option th:each="act : ${auditActions}"
                                th:value="${act}"
                                th:text="${act}"
                                th:selected="${act == actionFilter}">ACTION</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <button class="btn btn-primary w-100" type="submit">Filter</button>
                </div>
            </form>
            <th:block th:if="${auditPage.content.isEmpty()}">
                <div th:replace="~{fragments/components :: empty-state(
                    'bi-journal-x',
                    'No audit entries',
                    'Try adjusting your search or action filter.',
                    @{/admin/audit-log},
                    'Clear filters')}"></div>
            </th:block>
            <div class="table-responsive card sz-section-card shadow-sm" th:if="${!auditPage.content.isEmpty()}">
                <table class="table table-hover mb-0">
                    <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Details</th></tr></thead>
                    <tbody>
                    <tr th:each="entry : ${auditPage.content}">
                        <td class="small text-secondary" th:text="${#temporals.format(entry.createdAt, 'dd MMM yyyy HH:mm')}">time</td>
                        <td th:text="${entry.actorEmail}">actor</td>
                        <td><span class="badge text-bg-light text-dark" th:text="${entry.action}">action</span></td>
                        <td class="small" th:text="${entry.details}">details</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <nav class="mt-3" th:if="${auditPage.totalPages > 1}">
                <ul class="pagination">
                    <li class="page-item" th:classappend="${page == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/audit-log(q=${query}, action=${actionFilter}, page=${page - 1})}">Previous</a>
                    </li>
                    <li class="page-item disabled">
                        <span class="page-link" th:text="'Page ' + (${page} + 1) + ' of ' + ${auditPage.totalPages}">Page</span>
                    </li>
                    <li class="page-item" th:classappend="${page + 1 >= auditPage.totalPages} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/audit-log(q=${query}, action=${actionFilter}, page=${page + 1})}">Next</a>
                    </li>
                </ul>
            </nav>

</th:block>
</body>
</html>
