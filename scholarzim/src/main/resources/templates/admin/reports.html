<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Reports',
          'reports',
          '',
          '',
          'reports',
          ~{:: #admin-reports-content}
      )}">
<body>
<th:block id="admin-reports-content">

            <div th:replace="~{fragments/components :: dashboard-chrome(
                @{/admin/dashboard}, 'Dashboard',
                null, null,
                'Reports',
                'Export platform data for compliance, analysis, and viva evidence.')}"></div>
            <div th:replace="~{fragments/components :: report-export-grid}"></div>
            <section class="sz-dashboard-panel">
                <div class="sz-dashboard-panel__head">
                    <h2><i class="bi bi-info-circle text-primary me-1"></i> Export notes</h2>
                </div>
                <div class="sz-dashboard-panel__body">
                    <ul class="small text-secondary mb-0 ps-3">
                        <li class="mb-2">PDF reports are formatted for printing and examiner review.</li>
                        <li class="mb-2">Excel exports open in Microsoft Excel or Google Sheets for further analysis.</li>
                        <li>Audit history is available separately on the <a th:href="@{/admin/audit-log}">audit log</a> page.</li>
                    </ul>
                </div>
            </section>

</th:block>
</body>
</html>
