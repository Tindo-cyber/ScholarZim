<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Saved Scholarships',
          'saved',
          'saved',
          '',
          '',
          ~{:: #saved-content}
      )}">
<body>
<th:block id="saved-content">

    <div class="sz-page-shell is-loaded" id="szSavedPage" data-page="scholarships">
        <div class="sz-page-shell__content">

            <div th:replace="~{fragments/components :: dashboard-chrome(
                @{/applicant/dashboard}, 'Dashboard',
                null, null,
                'Saved scholarships',
                'Bookmarks you can return to when you are ready to apply.')}"></div>

            <div class="sz-opp-grid" th:if="${saved != null and !saved.isEmpty()}">
                <th:block th:each="opp : ${saved}">
                    <div th:replace="~{fragments/components :: scholarship-card(opportunity=${opp}, showApply=true, withApplyBtn=true, removeId=${opp.opportunityId}, matchScore=null, eligibilityText=null)}"></div>
                </th:block>
            </div>

        </div>
    </div>

</th:block>
</body>
</html>
