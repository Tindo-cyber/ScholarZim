<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Saved Scholarships')}"></head>
<body>
    <div th:replace="~{fragments/layout :: skip-link}"></div>
<div class="d-flex sz-shell">
    <div th:replace="~{fragments/layout :: sidebar('saved')}"></div>
    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">
        <nav th:replace="~{fragments/layout :: topbar('Saved Scholarships')}"></nav>
        <main class="sz-content has-mobile-nav p-3 p-md-4">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div th:replace="~{fragments/components :: page-header('Saved scholarships', 'Bookmarks you can return to when you are ready to apply.')}"></div>

            <div th:if="${saved.isEmpty()}"
                 th:replace="~{fragments/components :: empty-state('bi-bookmark', 'Nothing saved yet', 'Browse opportunities and bookmark scholarships to review later.', @{/opportunities}, 'Browse opportunities')}"></div>

            <div class="sz-opp-grid" th:if="${!saved.isEmpty()}">
                <th:block th:each="opp : ${saved}">
                    <div th:replace="~{fragments/components :: scholarship-card(opportunity=${opp}, showApply=true, withApplyBtn=false, removeId=${opp.opportunityId})}"></div>
                </th:block>
            </div>
        </main>
    </div>
</div>
<nav th:replace="~{fragments/layout :: mobile-nav('saved')}"></nav>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
