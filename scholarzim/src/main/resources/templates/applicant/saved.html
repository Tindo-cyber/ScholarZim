<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Saved Scholarships',
          'saved',
          'dashboard',
          'applications',
          'dashboard',
          ~{:: #saved-content}
      )}">
<body>
<th:block id="saved-content">

            <div th:replace="~{fragments/components :: page-header('Saved scholarships', 'Bookmarks you can return to when you are ready to apply.')}"></div>

            <th:block th:if="${saved.isEmpty()}">
                <div th:replace="~{fragments/components :: empty-state('bi-bookmark', 'Nothing saved yet', 'Browse opportunities and bookmark scholarships to review later.', @{/opportunities}, 'Browse opportunities')}"></div>
            </th:block>

            <div class="sz-opp-grid" th:if="${!saved.isEmpty()}">
                <th:block th:each="opp : ${saved}">
                    <div th:replace="~{fragments/components :: scholarship-card(opportunity=${opp}, showApply=true, withApplyBtn=false, removeId=${opp.opportunityId})}"></div>
                </th:block>
            </div>

</th:block>
</body>
</html>
