<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'ScholarFit',
          'recommendations',
          'recommendations',
          '',
          '',
          ~{:: #recommendations-content}
      )}">
<body>
<th:block id="recommendations-content">

    <div class="sz-page-shell is-loaded" id="szRecommendationsPage" data-page="scholarships">
        <div class="sz-page-shell__content">

    <nav th:replace="~{fragments/components :: breadcrumbs(
        @{/applicant/dashboard}, 'Dashboard',
        null, null,
        'ScholarFit')}"></nav>

    <section class="sz-scholarfit-hero">
        <div class="sz-scholarfit-hero__copy">
            <span class="sz-scholarfit-hero__badge"><i class="bi bi-stars"></i> ScholarFit</span>
            <h1 class="sz-scholarfit-hero__title">Your personalised scholarship matches</h1>
            <p class="sz-scholarfit-hero__subtitle">
                Every recommendation includes a match score, confidence rating, and clear reasons
                why you qualify — or what to fix to improve your fit.
            </p>
        </div>
        <div class="sz-scholarfit-hero__stats">
            <div class="sz-scholarfit-hero__stat">
                <span class="sz-scholarfit-hero__stat-value"
                      th:text="${opportunities != null ? opportunities.size() : 0}">0</span>
                <span class="sz-scholarfit-hero__stat-label">Matches found</span>
            </div>
            <div class="sz-scholarfit-hero__stat">
                <span class="sz-scholarfit-hero__stat-value"
                      th:text="${opportunities != null and !opportunities.isEmpty()
                          ? opportunities[0].matchScore + '%' : '0%'}">0%</span>
                <span class="sz-scholarfit-hero__stat-label">Top match</span>
            </div>
        </div>
    </section>

    <div th:if="${!hasProfile}" class="alert alert-warning rounded-4">
        <i class="bi bi-exclamation-triangle me-2"></i>
        Complete your
        <a th:href="@{/applicant/profile}" class="alert-link fw-semibold">academic profile</a>
        to unlock ScholarFit recommendations.
    </div>

    <div th:if="${hasProfile and opportunities != null and !opportunities.isEmpty()}" class="sz-scholarfit-grid">
        <th:block th:each="scored : ${opportunities}">
            <div th:replace="~{fragments/components :: scholarfit-recommendation-card(scored=${scored})}"></div>
        </th:block>
    </div>

        </div>
    </div>

</th:block>
</body>
</html>
