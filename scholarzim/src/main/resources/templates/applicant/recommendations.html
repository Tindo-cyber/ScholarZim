<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Your Matches',
          'recommendations',
          'recommendations',
          'applications',
          'dashboard',
          ~{:: #recommendations-content}
      )}">
<body>
<th:block id="recommendations-content">

            <div th:replace="~{fragments/components :: page-header('Recommended for you', 'Scholarships matched to your education level, field of study, and location.')}"></div>

            <div th:if="${!hasProfile}" class="alert alert-warning rounded-4">
                <i class="bi bi-exclamation-triangle me-2"></i>
                Complete your
                <a th:href="@{/applicant/profile}" class="alert-link fw-semibold">academic profile</a>
                to unlock personalised recommendations.
            </div>

            <div th:if="${hasProfile and opportunities.isEmpty()}" class="sz-empty">
                <div class="sz-empty-icon"><i class="bi bi-stars"></i></div>
                <h3 class="h5 fw-bold">No matches yet</h3>
                <p class="text-secondary mb-3">
                    Update your profile or check back when new opportunities are posted.
                </p>
                <a th:href="@{/applicant/profile}" class="btn btn-outline-primary btn-sm me-2">Edit profile</a>
                <a th:href="@{/opportunities}" class="btn btn-primary btn-sm">Browse all</a>
            </div>

            <div th:if="${hasProfile and !opportunities.isEmpty()}" class="sz-opp-grid">
                <th:block th:each="scored : ${opportunities}">
                    <div th:replace="~{fragments/components :: scored-card(scored=${scored})}"></div>
                </th:block>
            </div>

</th:block>
</body>
</html>
