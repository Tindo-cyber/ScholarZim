<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Dashboard',
          'dashboard',
          'dashboard',
          'applications',
          'dashboard',
          ~{:: #dashboard-content}
      )}">
<body>
<th:block id="dashboard-content">

    <div class="sz-page-shell sz-applicant-dashboard" id="szApplicantDashboard" data-page="dashboard">
        <div class="sz-page-shell__skeleton" th:replace="~{fragments/components :: skeleton-dashboard}"></div>
        <div class="sz-page-shell__content sz-dash-content">

            <!-- Top: greeting + highlight cards -->
            <header class="sz-dash-hero">
                <div class="sz-dash-hero__intro">
                    <p class="sz-dash-hero__date"
                       th:text="${#temporals.format(#temporals.createNow(), 'EEEE, d MMMM yyyy')}">Today</p>
                    <h1 class="sz-dash-hero__title">
                        <span th:text="${greeting}">Good Evening</span>,
                        <span class="sz-dash-hero__name"
                              th:text="${userFullName != null ? userFullName : 'there'}">Student</span>
                    </h1>
                    <p class="sz-dash-hero__subtitle"
                       th:if="${stats.profileCompletion >= 100}">
                        Your profile is complete — explore matches and track your applications.
                    </p>
                    <p class="sz-dash-hero__subtitle"
                       th:if="${stats.profileCompletion < 100}">
                        Complete your profile to unlock AI-powered scholarship recommendations.
                    </p>
                </div>

                <div class="sz-dash-hero__highlights">
                    <div th:replace="~{fragments/components :: premium-highlight-card(
                        'bi-person-check',
                        'sz-tone-primary',
                        'Profile Completion',
                        ${stats.profileCompletion} + '%',
                        ${stats.profileCompletion >= 100 ? 'Ready for personalised matches' : 'Finish your academic profile'},
                        '/applicant/profile',
                        'Continue')}"></div>

                    <th:block th:if="${notifUnreadCount != null and notifUnreadCount > 0}">
                        <div th:replace="~{fragments/components :: premium-highlight-card(
                            'bi-bell',
                            'sz-tone-warning',
                            'Notifications',
                            ${notifUnreadCount},
                            'Unread updates waiting for you',
                            '/notifications',
                            'View all')}"></div>
                    </th:block>

                    <th:block th:if="${stats.upcomingDeadlinesCount > 0}">
                        <div th:replace="~{fragments/components :: premium-highlight-card(
                            'bi-calendar-event',
                            'sz-tone-accent',
                            'Upcoming Deadlines',
                            ${stats.upcomingDeadlinesCount},
                            'Scholarships closing soon',
                            '/applicant/recommendations',
                            'See deadlines')}"></div>
                    </th:block>
                </div>
            </header>

            <!-- Row 1: key metrics -->
            <section class="sz-dash-section" aria-label="Key metrics">
                <div class="sz-dash-grid sz-dash-grid--4">
                    <div th:replace="~{fragments/components :: premium-metric-card(
                        '/applicant/recommendations',
                        'bi-stars',
                        'sz-tone-primary',
                        'Eligible Scholarships',
                        ${stats.eligibleScholarships},
                        'Matched to your profile')}"></div>
                    <div th:replace="~{fragments/components :: premium-metric-card(
                        '/my-applications',
                        'bi-send-check',
                        'sz-tone-accent',
                        'Applications Submitted',
                        ${stats.applicationsSubmitted},
                        'Track your progress')}"></div>
                    <div th:replace="~{fragments/components :: premium-metric-card(
                        '/applicant/saved',
                        'bi-bookmark-heart',
                        'sz-tone-warning',
                        'Saved Scholarships',
                        ${stats.savedCount},
                        'Bookmarks for later')}"></div>
                    <div th:replace="~{fragments/components :: premium-metric-card(
                        '/applicant/profile',
                        'bi-pie-chart',
                        'sz-tone-success',
                        'Profile Completion',
                        ${stats.profileCompletion} + '%',
                        'Unlock better matches')}"></div>
                </div>
            </section>

            <!-- ScholarFit: only when incomplete profile CTA or real matches -->
            <section class="sz-dash-section" aria-label="AI recommended scholarships"
                     th:if="${!stats.hasProfile or (recommendations != null and !recommendations.isEmpty())}">
                <div th:replace="~{fragments/components :: premium-panel(
                    'bi-robot',
                    'ScholarFit AI Matches',
                    '/applicant/recommendations',
                    'See all matches',
                    ~{:: #rec-body}
                )}">
                    <th:block id="rec-body">
                        <div th:if="${!stats.hasProfile}" class="sz-dash-inline-alert">
                            <i class="bi bi-exclamation-circle"></i>
                            <span>Complete your <a th:href="@{/applicant/profile}">profile</a> to unlock AI recommendations.</span>
                        </div>

                        <div class="sz-scholarfit-grid sz-scholarfit-grid--compact"
                             th:if="${stats.hasProfile and recommendations != null and !recommendations.isEmpty()}">
                            <th:block th:each="scored : ${recommendations}">
                                <div th:replace="~{fragments/components :: scholarfit-recommendation-card(scored=${scored})}"></div>
                            </th:block>
                        </div>
                    </th:block>
                </div>
            </section>

            <!-- Application timeline: only when there is activity -->
            <section class="sz-dash-section" aria-label="Application timeline"
                     th:if="${recentApplications != null and !recentApplications.isEmpty()}">
                <div th:replace="~{fragments/components :: premium-panel(
                    'bi-diagram-3',
                    'Application Timeline',
                    '/my-applications',
                    'Full history',
                    ~{:: #timeline-body}
                )}">
                    <th:block id="timeline-body">
                        <div class="sz-dash-timeline">
                            <article class="sz-dash-timeline__item" th:each="app : ${recentApplications}">
                                <div class="sz-dash-timeline__dot" aria-hidden="true"></div>
                                <div class="sz-dash-timeline__card">
                                    <div class="sz-dash-timeline__top">
                                        <h3 class="sz-dash-timeline__title"
                                            th:text="${app.opportunity != null ? app.opportunity.title : 'Application'}">Title</h3>
                                        <span th:replace="~{fragments/components :: status-badge(${app.applicationStatus})}"></span>
                                    </div>
                                    <p class="sz-dash-timeline__meta"
                                       th:text="${app.submittedAt != null
                                          ? #temporals.format(app.submittedAt, 'dd MMM yyyy · HH:mm') : '—'}">Date</p>
                                </div>
                            </article>
                        </div>
                    </th:block>
                </div>
            </section>

            <!-- Notifications: only when present -->
            <section class="sz-dash-section" aria-label="Recent notifications"
                     th:if="${notifRecent != null and !notifRecent.isEmpty()}">
                <div th:replace="~{fragments/components :: premium-panel(
                    'bi-bell',
                    'Recent Notifications',
                    '/notifications',
                    'View all',
                    ~{:: #notif-body}
                )}">
                    <th:block id="notif-body">
                        <div class="sz-dash-notif-list">
                            <a th:each="n : ${notifRecent}"
                               th:href="@{/notifications/{id}/open(id=${n.notificationId})}"
                               class="sz-dash-notif-item"
                               th:classappend="${n.unread} ? 'sz-dash-notif-item--unread' : ''">
                                <span class="sz-dash-notif-item__icon"
                                      th:classappend="${n.unread} ? 'sz-dash-notif-item__icon--active' : ''">
                                    <i class="bi bi-bell"></i>
                                </span>
                                <span class="sz-dash-notif-item__content">
                                    <span class="sz-dash-notif-item__text" th:text="${n.message}">Message</span>
                                    <span class="sz-dash-notif-item__time"
                                          th:text="${n.createdAt != null
                                             ? #temporals.format(n.createdAt, 'dd MMM, HH:mm') : ''}"></span>
                                </span>
                                <i class="bi bi-chevron-right sz-dash-notif-item__chevron" aria-hidden="true"></i>
                            </a>
                        </div>
                    </th:block>
                </div>
            </section>

            <!-- Deadlines: only when present -->
            <section class="sz-dash-section" aria-label="Upcoming deadlines calendar"
                     th:if="${upcomingDeadlines != null and !upcomingDeadlines.isEmpty()}">
                <div th:replace="~{fragments/components :: premium-panel(
                    'bi-calendar3',
                    'Upcoming Deadlines Calendar',
                    '/applicant/recommendations',
                    'All deadlines',
                    ~{:: #calendar-body}
                )}">
                    <th:block id="calendar-body">
                        <div class="sz-dash-calendar-wrap">
                            <div class="sz-dash-calendar" id="szDashCalendar" aria-label="Deadline calendar"></div>
                            <div class="sz-dash-calendar-events" id="szDashCalendarEvents" hidden>
                                <span th:each="item : ${upcomingDeadlines}"
                                      class="sz-dash-calendar__event"
                                      th:attr="data-date=${item.opportunity.deadline},
                                               data-title=${item.opportunity.title}"></span>
                            </div>
                            <ul class="sz-dash-deadline-list">
                                <li class="sz-dash-deadline-list__item" th:each="item : ${upcomingDeadlines}">
                                    <div class="sz-dash-deadline-list__date"
                                         th:text="${item.opportunity.deadline != null
                                            ? #temporals.format(item.opportunity.deadline, 'dd MMM') : '—'}">Date</div>
                                    <div class="sz-dash-deadline-list__info">
                                        <span class="sz-dash-deadline-list__title"
                                              th:text="${item.opportunity.title}">Title</span>
                                        <span class="sz-deadline small"
                                              th:if="${item.opportunity.deadline != null}"
                                              th:attr="data-deadline=${item.opportunity.deadline}">Deadline</span>
                                    </div>
                                </li>
                            </ul>
                        </div>
                    </th:block>
                </div>
            </section>

        </div>
    </div>

</th:block>
</body>
</html>
