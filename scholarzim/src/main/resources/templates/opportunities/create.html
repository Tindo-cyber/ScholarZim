<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Create Opportunity')}"></head>

<body>

<div class="d-flex sz-shell">

    <div th:replace="~{fragments/layout :: sidebar('create')}"></div>

    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">

        <nav th:replace="~{fragments/layout :: topbar('Create Opportunity')}"></nav>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <main class="sz-content has-mobile-nav p-3 p-md-4">

            <div th:replace="~{fragments/components :: page-header('Create opportunity', 'Publish a new scholarship for students to discover and apply.')}"></div>

            <div class="card sz-section-card">
                <div class="card-body p-4">

                    <form th:action="@{/opportunities/create}"
                          method="post"
                          th:object="${opportunityRequest}">

                        <input type="hidden" th:replace="~{fragments/layout :: csrf}">

                        <div class="row g-3">

                            <div class="col-12">
                                <label class="form-label">Title</label>
                                <input type="text" class="form-control"
                                       th:field="*{title}"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('title')}"
                                     th:errors="*{title}"></div>
                            </div>

                            <div class="col-12">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" rows="3" th:field="*{description}"></textarea>
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Education level</label>
                                <select class="form-select"
                                        th:field="*{educationLevel}"
                                        th:classappend="${#fields.hasErrors('educationLevel')} ? 'is-invalid'">
                                    <option value="">Select level</option>
                                    <optgroup label="Primary school (Grade 1–7)">
                                        <option th:each="level : ${primaryGrades}"
                                                th:value="${level}" th:text="${level}"></option>
                                    </optgroup>
                                    <optgroup label="Secondary school (Form 1–6)">
                                        <option th:each="level : ${secondaryForms}"
                                                th:value="${level}" th:text="${level}"></option>
                                    </optgroup>
                                    <optgroup label="Tertiary &amp; postgraduate">
                                        <option th:each="level : ${tertiaryLevels}"
                                                th:value="${level}" th:text="${level}"></option>
                                    </optgroup>
                                </select>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('educationLevel')}"
                                     th:errors="*{educationLevel}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Funding Type</label>
                                <select class="form-select" th:field="*{fundingType}">
                                    <option value="">-- Select --</option>
                                    <option th:each="type : ${fundingTypes}"
                                            th:value="${type}" th:text="${type}"></option>
                                </select>
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Host country</label>
                                <input type="text" class="form-control" th:field="*{country}"
                                       list="oppCountryList"
                                       placeholder="Select or type a country">
                                <datalist id="oppCountryList">
                                    <option th:each="c : ${countries}" th:value="${c}"></option>
                                </datalist>
                                <div class="form-text">Defaults to Zimbabwe. Type another country if the scholarship is hosted abroad.</div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Deadline</label>
                                <input type="date" class="form-control"
                                       th:field="*{deadline}"
                                       th:classappend="${#fields.hasErrors('deadline')} ? 'is-invalid'">
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('deadline')}"
                                     th:errors="*{deadline}"></div>
                            </div>

                            <div class="col-12 col-md-6">
                                <label class="form-label">Target field / subject</label>
                                <input type="text" class="form-control"
                                       th:field="*{targetField}"
                                       list="oppFieldList"
                                       placeholder="Select or type a field of study"
                                       th:classappend="${#fields.hasErrors('targetField')} ? 'is-invalid'">
                                <datalist id="oppFieldList">
                                    <option th:each="field : ${fieldsOfStudy}" th:value="${field}"></option>
                                </datalist>
                                <div class="invalid-feedback"
                                     th:if="${#fields.hasErrors('targetField')}"
                                     th:errors="*{targetField}"></div>
                                <div class="form-text">Choose from the list or enter a custom subject (e.g. Primary General).</div>
                            </div>

                        </div>

                        <div class="mt-4">
                            <button class="btn btn-primary" type="submit">
                                <i class="bi bi-save me-1"></i>Save Opportunity
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </main>
    </div>
</div>

<div th:replace="~{fragments/layout :: provider-mobile-nav('create')}"></div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
