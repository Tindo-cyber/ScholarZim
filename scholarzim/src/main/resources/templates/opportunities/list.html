<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Scholarships & Funding',
          'opportunities',
          'opportunities',
          '',
          '',
          ~{:: #opportunities-list-content}
      )}">
<body>
<th:block id="opportunities-list-content">

    <div class="sz-page-shell is-loaded" id="szScholarshipsPage" data-page="scholarships">
        <div class="sz-page-shell__content">

            <div th:replace="~{fragments/components :: dashboard-chrome(
                @{/applicant/dashboard}, 'Dashboard',
                null, null,
                'Browse opportunities',
                'Discover scholarships and funding from Zimbabwean and international providers.')}"></div>

            <div class="sz-filter-card card shadow-sm mb-4">
                <div class="card-body p-4">
                    <form th:action="@{/opportunities}" method="get"
                          th:object="${searchRequest}" class="row g-3 align-items-end">

                        <div class="col-12 col-md-6 col-lg-3">
                            <label class="form-label">Education level</label>
                            <select class="form-select" th:field="*{educationLevel}">
                                <option value="">All levels</option>
                                <option th:each="level : ${educationLevels}"
                                        th:value="${level}" th:text="${level}"></option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <label class="form-label">Field of study</label>
                            <select class="form-select" th:field="*{fieldOfStudy}">
                                <option value="">All fields</option>
                                <option th:each="field : ${fieldsOfStudy}"
                                        th:value="${field}" th:text="${field}"></option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <label class="form-label">Destination</label>
                            <select class="form-select" th:field="*{country}">
                                <option value="">All countries</option>
                                <option th:each="c : ${countries}"
                                        th:value="${c}" th:text="${c}"></option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <label class="form-label">Provider</label>
                            <select class="form-select" th:field="*{provider}">
                                <option value="">All providers</option>
                                <option th:each="p : ${providerNames}"
                                        th:value="${p}" th:text="${p}"></option>
                            </select>
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <label class="form-label">Keyword</label>
                            <input type="search" class="form-control" th:field="*{keyword}"
                                   placeholder="Search title, provider…">
                        </div>

                        <div class="col-12 col-md-6 col-lg-3">
                            <label class="form-label">Deadline before</label>
                            <input type="date" class="form-control" th:field="*{deadlineBefore}">
                        </div>

                        <div class="col-12 col-lg-9 d-flex gap-2">
                            <button class="btn btn-primary" type="submit">
                                <i class="bi bi-funnel me-1"></i>Search
                            </button>
                            <a class="btn btn-outline-secondary" th:href="@{/opportunities}">
                                <i class="bi bi-arrow-counterclockwise me-1"></i>Reset
                            </a>
                        </div>

                    </form>
                </div>
            </div>

            <p class="text-secondary small mb-3">
                <strong th:text="${opportunities.size()}">0</strong>
                opportunit<span th:text="${opportunities.size() == 1} ? 'y' : 'ies'">ies</span> found
            </p>

            <div th:if="${opportunities.isEmpty()}"
                 th:replace="~{fragments/components :: empty-state(
                     'bi-search', 'No opportunities found',
                     'Try widening your filters or check back later for new listings.',
                     @{/opportunities}, 'Reset filters')}"></div>

            <div th:if="${!opportunities.isEmpty()}" class="sz-opp-grid">
                <th:block th:each="opp : ${opportunities}">
                    <div th:replace="~{fragments/components :: scholarship-card(opportunity=${opp}, showApply=true, withApplyBtn=true, removeId=null, matchScore=null, eligibilityText=null)}"></div>
                </th:block>
            </div>

        </div>
    </div>

</th:block>
</body>
</html>
