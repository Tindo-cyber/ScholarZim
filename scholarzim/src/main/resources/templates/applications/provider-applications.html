<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'Applications Review',
          'applications',
          '',
          'applications',
          '',
          ~{:: #provider-applications-content}
      )}">
<body>
<th:block id="provider-applications-content">

            <div th:replace="~{fragments/components :: page-header('Applications review', 'Review and decide on student applications for your opportunities.')}"></div>

            <th:block th:if="${applications.isEmpty()}">
                <div th:replace="~{fragments/components :: empty-state('bi-inbox', 'No applications yet', 'Applications will appear here once students apply to your opportunities.', null, null)}"></div>
            </th:block>

            <div th:if="${!applications.isEmpty()}" class="card sz-section-card shadow-sm">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Applicant</th>
                            <th>Opportunity</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="app : ${applications}">
                            <td class="fw-semibold"
                                th:text="${app.user != null ? app.user.fullName : 'Applicant'}"></td>
                            <td th:text="${app.opportunity != null ? app.opportunity.title : 'Opportunity'}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${app.applicationStatus == 'APPROVED' ? 'text-bg-success'
                                          : (app.applicationStatus == 'REJECTED' ? 'text-bg-danger' : 'text-bg-warning')}"
                                      th:text="${app.applicationStatus}"></span>
                            </td>
                            <td class="text-end">
                                <a th:href="@{/provider/applications/{id}(id=${app.applicationId})}"
                                   class="btn btn-sm btn-outline-primary me-1">
                                    <i class="bi bi-eye me-1"></i>Review
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

</th:block>
</body>
</html>
