<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'My Applications',
          'my-applications',
          'my-applications',
          '',
          '',
          ~{:: #applications-content}
      )}">
<body>
<th:block id="applications-content">

    <div class="sz-page-shell is-loaded" id="szApplicationsPage" data-page="applications">
        <div class="sz-page-shell__content">

    <nav th:replace="~{fragments/components :: breadcrumbs(
        @{/applicant/dashboard}, 'Dashboard',
        null, null,
        'Applications')}"></nav>

    <div th:replace="~{fragments/components :: page-header('Application tracker', 'Follow every scholarship application through each stage — from submission to award.')}"></div>

        <div class="row g-3 mb-4" th:if="${totalAll > 0}">
            <div class="col-6 col-md-3">
                <div th:replace="~{fragments/components :: stat-card('bi-file-earmark-text', ${totalAll}, 'Total applications', 'bg-primary-subtle text-primary')}"></div>
            </div>
            <div class="col-6 col-md-3">
                <div th:replace="~{fragments/components :: stat-card('bi-hourglass-split', ${pendingCount}, 'In progress', 'bg-warning-subtle text-warning')}"></div>
            </div>
            <div class="col-6 col-md-3">
                <div th:replace="~{fragments/components :: stat-card('bi-trophy', ${approvedCount}, 'Awarded', 'bg-success-subtle text-success')}"></div>
            </div>
            <div class="col-6 col-md-3">
                <div th:replace="~{fragments/components :: stat-card('bi-x-circle', ${rejectedCount}, 'Rejected', 'bg-danger-subtle text-danger')}"></div>
            </div>
        </div>

        <form class="card sz-section-card shadow-sm mb-4 sz-app-tracker__filters" method="get" th:action="@{/my-applications}" th:if="${totalAll > 0}">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold" for="applications-search">Search</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input id="applications-search"
                                   class="form-control"
                                   type="search"
                                   name="q"
                                   placeholder="Search by scholarship or provider"
                                   th:value="${q}">
                        </div>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-semibold" for="applications-status">Status</label>
                        <select id="applications-status" class="form-select" name="status">
                            <option value="" th:selected="${statusFilter == null or statusFilter.isEmpty()}">All statuses</option>
                            <option value="PENDING" th:selected="${statusFilter == 'PENDING'}">In progress</option>
                            <option value="SUBMITTED" th:selected="${statusFilter == 'SUBMITTED'}">Submitted</option>
                            <option value="UNDER_REVIEW" th:selected="${statusFilter == 'UNDER_REVIEW'}">Under review</option>
                            <option value="SHORTLISTED" th:selected="${statusFilter == 'SHORTLISTED'}">Shortlisted</option>
                            <option value="INTERVIEW" th:selected="${statusFilter == 'INTERVIEW'}">Interview</option>
                            <option value="AWARDED" th:selected="${statusFilter == 'AWARDED'}">Awarded</option>
                            <option value="REJECTED" th:selected="${statusFilter == 'REJECTED'}">Rejected</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="submit" class="btn btn-primary">Filter</button>
                    </div>
                </div>
            </div>
        </form>

        <div th:if="${filteredTotal > 0}" class="sz-app-tracker">
            <th:block th:each="trackerApp : ${applications}">
                <div th:replace="~{fragments/components :: application-tracker-card(app=${trackerApp})}"></div>
            </th:block>
        </div>

        <nav th:if="${totalPages > 1}"
             th:replace="~{fragments/components :: list-pagination(
                 ${currentPage},
                 ${totalPages},
                 ${q},
                 ${statusFilter})}"></nav>

        </div>
    </div>

</th:block>
</body>
</html>
