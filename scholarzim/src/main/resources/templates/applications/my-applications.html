<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/dashboard-layout :: page(
          'My Applications',
          'my-applications',
          'my-applications',
          'applications',
          'dashboard',
          ~{:: #applications-content}
      )}">
<body>
<th:block id="applications-content">

    <nav th:replace="~{fragments/components :: breadcrumbs(
        @{/applicant/dashboard}, 'Dashboard',
        null, null,
        'Applications')}"></nav>

    <div th:replace="~{fragments/components :: page-header('Application tracker', 'Monitor the status of every scholarship you have applied for.')}"></div>

    <div th:if="${applications.isEmpty()}" class="sz-empty">
        <div class="sz-empty-icon"><i class="bi bi-file-earmark-text"></i></div>
        <h3 class="h5 fw-bold">No applications yet</h3>
        <p class="text-secondary mb-3">
            Browse available scholarships and submit your first application.
        </p>
        <a th:href="@{/opportunities}" class="btn btn-primary">
            <i class="bi bi-search me-1"></i>Browse scholarships
        </a>
    </div>

    <div th:if="${!applications.isEmpty()}">
        <div class="sz-analytics-panel mb-4"
             th:with="total=${applications.size()},
                      approved=${#lists.size(applications.?[applicationStatus == 'APPROVED'])},
                      pending=${#lists.size(applications.?[applicationStatus == 'PENDING' or applicationStatus == 'SUBMITTED' or applicationStatus == 'UNDER_REVIEW' or applicationStatus == 'DOCUMENTS_REQUESTED' or applicationStatus == 'WAITLISTED'])},
                      rejected=${#lists.size(applications.?[applicationStatus == 'REJECTED'])},
                      pendPct=${total > 0 ? (pending * 100) / total : 0},
                      apprPct=${total > 0 ? (approved * 100) / total : 0},
                      rejPct=${total > 0 ? (rejected * 100) / total : 0}">
            <div class="sz-analytics-panel__title">
                <i class="bi bi-bar-chart-line text-primary me-1"></i>
                <span th:text="${total}">0</span> application<span th:if="${total != 1}">s</span> tracked
            </div>
            <div th:replace="~{fragments/components :: analytics-bar(${pendPct}, ${apprPct}, ${rejPct})}"></div>
        </div>

        <div class="sz-app-card" th:each="app : ${applications}">
            <div class="sz-app-status-icon"
                 th:classappend="${app.applicationStatus == 'APPROVED' ? ' bg-success-subtle text-success'
                     : (app.applicationStatus == 'REJECTED' ? ' bg-danger-subtle text-danger' : ' bg-warning-subtle text-warning')}">
                <i th:classappend="${app.applicationStatus == 'APPROVED' ? ' bi-check-lg'
                     : (app.applicationStatus == 'REJECTED' ? ' bi-x-lg' : ' bi-hourglass-split')}"></i>
            </div>
            <div class="flex-grow-1 min-w-0">
                <div class="fw-bold text-truncate"
                     th:text="${app.opportunity.title}">Opportunity</div>
                <div class="small text-secondary"
                     th:text="${app.opportunity.providerName}">Provider</div>
                <div class="small text-secondary mt-1">
                    <i class="bi bi-calendar3 me-1"></i>
                    Applied <span th:text="${app.submittedAt != null
                        ? #temporals.format(app.submittedAt, 'dd MMM yyyy') : '—'}"></span>
                </div>
            </div>
            <span class="badge rounded-pill fs-6"
                  th:classappend="${app.applicationStatus == 'APPROVED' ? 'text-bg-success'
                      : (app.applicationStatus == 'REJECTED' ? 'text-bg-danger' : 'text-bg-warning')}"
                  th:text="${app.applicationStatus}">PENDING</span>
        </div>
    </div>

</th:block>
</body>
</html>
