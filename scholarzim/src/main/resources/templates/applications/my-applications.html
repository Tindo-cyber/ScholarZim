<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('My Applications')}"></head>

<body>

<div class="d-flex sz-shell">

    <div th:replace="~{fragments/layout :: sidebar('my-applications')}"></div>

    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">

        <nav th:replace="~{fragments/layout :: topbar('My Applications')}"></nav>

        <main class="sz-content has-mobile-nav p-3 p-md-4">

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="sz-page-header sz-animate-in mb-4">
                <h1>Application tracker</h1>
                <p class="text-secondary mb-0">Monitor the status of every scholarship you've applied for.</p>
            </div>

            <div th:if="${applications.isEmpty()}" class="sz-empty sz-animate-in">
                <div class="sz-empty-icon"><i class="bi bi-file-earmark-text"></i></div>
                <h3 class="h5 fw-bold">No applications yet</h3>
                <p class="text-secondary mb-3">
                    Browse available scholarships and submit your first application.
                </p>
                <a th:href="@{/opportunities}" class="btn btn-primary">
                    <i class="bi bi-search me-1"></i>Browse scholarships
                </a>
            </div>

            <div th:if="${!applications.isEmpty()}">
                <div class="sz-app-card sz-animate-in" th:each="application : ${applications}">
                    <div class="sz-app-status-icon"
                         th:classappend="${application.applicationStatus == 'APPROVED' ? ' bg-success-subtle text-success'
                             : (application.applicationStatus == 'REJECTED' ? ' bg-danger-subtle text-danger' : ' bg-warning-subtle text-warning')}">
                        <i th:classappend="${application.applicationStatus == 'APPROVED' ? ' bi-check-lg'
                             : (application.applicationStatus == 'REJECTED' ? ' bi-x-lg' : ' bi-hourglass-split')}"></i>
                    </div>
                    <div class="flex-grow-1 min-w-0">
                        <div class="fw-bold text-truncate"
                             th:text="${application.opportunity.title}">Opportunity</div>
                        <div class="small text-secondary"
                             th:text="${application.opportunity.providerName}">Provider</div>
                        <div class="small text-secondary mt-1">
                            <i class="bi bi-calendar3 me-1"></i>
                            Applied <span th:text="${application.submittedAt != null
                                ? #temporals.format(application.submittedAt, 'dd MMM yyyy') : '—'}"></span>
                        </div>
                    </div>
                    <span class="badge rounded-pill fs-6"
                          th:classappend="${application.applicationStatus == 'APPROVED' ? 'text-bg-success'
                              : (application.applicationStatus == 'REJECTED' ? 'text-bg-danger' : 'text-bg-warning')}"
                          th:text="${application.applicationStatus}">PENDING</span>
                </div>
            </div>

        </main>
    </div>
</div>

<nav th:replace="~{fragments/layout :: mobile-nav('my-applications')}"></nav>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
