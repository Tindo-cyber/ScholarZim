<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Application submitted')}"></head>

<body>

    <div th:replace="~{fragments/layout :: skip-link}"></div>
<div class="d-flex sz-shell">

    <div th:replace="~{fragments/layout :: sidebar('my-applications')}"></div>

    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">

        <nav th:replace="~{fragments/layout :: topbar('Application submitted')}"></nav>

        <main class="sz-content has-mobile-nav p-3 p-md-4">

            <nav th:replace="~{fragments/components :: breadcrumbs(
                @{/applicant/dashboard}, 'Dashboard',
                @{/my-applications}, 'Applications',
                'Confirmation')}"></nav>

            <div class="sz-confirm-card sz-dashboard-panel">
                <div class="sz-confirm-card__icon" aria-hidden="true">
                    <i class="bi bi-check-lg"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">Application submitted</h1>
                <p class="text-secondary mb-3">
                    Your application for
                    <strong th:text="${application.opportunity.title}">Scholarship</strong>
                    has been received. The provider will review it and you will be notified of any updates.
                </p>
                <p class="sz-confirm-card__ref mb-4">
                    Reference #<span th:text="${application.applicationId}">0</span>
                    <span th:if="${application.submittedAt != null}">
                        · Submitted
                        <span th:text="${#temporals.format(application.submittedAt, 'dd MMM yyyy · HH:mm')}"></span>
                    </span>
                </p>
                <div class="d-flex flex-wrap gap-2 justify-content-center">
                    <a th:href="@{/my-applications}" class="btn btn-primary">
                        <i class="bi bi-file-earmark-text me-1"></i>View my applications
                    </a>
                    <a th:href="@{/messages}" class="btn btn-outline-primary">
                        <i class="bi bi-chat-dots me-1"></i>Messages
                    </a>
                    <a th:href="@{/opportunities}" class="btn btn-outline-secondary">
                        <i class="bi bi-search me-1"></i>Browse more
                    </a>
                </div>
            </div>

        </main>
    </div>
</div>

<nav th:replace="~{fragments/layout :: mobile-nav('my-applications')}"></nav>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
