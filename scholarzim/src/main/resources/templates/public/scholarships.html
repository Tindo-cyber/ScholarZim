<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/public-layout :: head('Scholarships')}"></head>
<body>

<nav th:replace="~{fragments/public-layout :: navbar}"></nav>

<main class="py-4">
    <div class="container">
        <div class="mb-4">
            <h1 class="h3 fw-bold">Browse scholarships</h1>
            <p class="text-secondary mb-0">
                <strong th:text="${opportunities.size()}">0</strong> active opportunities ·
                <a th:href="@{/register}">Register</a> to apply
            </p>
        </div>

        <div class="sz-filter-card mb-4">
            <div class="card-body p-4">
                <form th:action="@{/scholarships}" method="get" th:object="${searchRequest}" class="row g-3 align-items-end">
                    <div class="col-6 col-md-3">
                        <label class="form-label">Level</label>
                        <select class="form-select" th:field="*{educationLevel}">
                            <option value="">All</option>
                            <option th:each="l : ${educationLevels}" th:value="${l}" th:text="${l}"></option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">Field</label>
                        <select class="form-select" th:field="*{fieldOfStudy}">
                            <option value="">All</option>
                            <option th:each="f : ${fieldsOfStudy}" th:value="${f}" th:text="${f}"></option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">Country</label>
                        <select class="form-select" th:field="*{country}">
                            <option value="">All</option>
                            <option th:each="c : ${countries}" th:value="${c}" th:text="${c}"></option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3 d-flex gap-2">
                        <button class="btn btn-primary flex-grow-1" type="submit">Search</button>
                        <a class="btn btn-outline-secondary" th:href="@{/scholarships}">Reset</a>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${opportunities.isEmpty()}" class="sz-empty">
            <div class="sz-empty-icon"><i class="bi bi-search"></i></div>
            <p class="text-secondary">No scholarships match your filters.</p>
        </div>

        <div class="sz-opp-grid" th:if="${!opportunities.isEmpty()}">
            <div class="sz-opp-card" th:each="opp : ${opportunities}">
                <div class="sz-opp-card__header">
                    <div class="sz-opp-title" th:text="${opp.title}">Title</div>
                    <div class="sz-opp-provider"><i class="bi bi-building"></i>
                        <span th:text="${opp.providerName}">Provider</span></div>
                </div>
                <div class="sz-opp-card__body">
                    <p class="sz-opp-desc" th:text="${opp.description}">Desc</p>
                    <div class="sz-opp-meta">
                        <span class="sz-badge sz-badge--level" th:text="${opp.educationLevel}">Level</span>
                        <span class="sz-badge sz-badge--funding" th:if="${opp.fundingType}" th:text="${opp.fundingType}">Funding</span>
                    </div>
                </div>
                <div class="sz-opp-card__footer">
                    <span class="sz-deadline" th:if="${opp.deadline != null}" th:attr="data-deadline=${opp.deadline}">Deadline</span>
                    <a th:href="@{/scholarships/{id}(id=${opp.opportunityId})}" class="btn btn-primary btn-sm">View details</a>
                </div>
            </div>
        </div>
    </div>
</main>

<th:block th:replace="~{fragments/public-layout :: scripts}"></th:block>
</body>
</html>
