<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Notifications')}"></head>

<body>

<div class="d-flex sz-shell">

    <div th:replace="~{fragments/layout :: sidebar('notifications')}"></div>

    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">

        <nav th:replace="~{fragments/layout :: topbar('Notifications')}"></nav>

        <main class="sz-content has-mobile-nav p-3 p-md-4">

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <nav th:replace="~{fragments/components :: breadcrumbs(
                @{/applicant/dashboard}, 'Dashboard',
                null, null,
                'Notifications')}"></nav>

            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
                <div th:replace="~{fragments/components :: page-header('Notifications', 'Deadline reminders, status updates, and match alerts.')}"></div>
                <form th:if="${!notifications.isEmpty()}"
                      th:action="@{/notifications/read-all}" method="post" class="m-0">
                    <input type="hidden" th:replace="~{fragments/layout :: csrf}">
                    <button class="btn btn-sm btn-outline-primary" type="submit">
                        <i class="bi bi-check2-all me-1"></i>Mark all read
                    </button>
                </form>
            </div>

            <div th:if="${notifications.isEmpty()}"
                 th:replace="~{fragments/components :: empty-state('bi-bell', 'No notifications', 'You are all caught up. New alerts will appear here.', null, null)}"></div>

            <div th:if="${!notifications.isEmpty()}" class="sz-notif-list">
                <a th:each="n : ${notifications}"
                   th:href="@{/notifications/{id}/open(id=${n.notificationId})}"
                   class="sz-notif-list__item"
                   th:classappend="${n.unread} ? 'sz-notif-item--unread'">
                    <span class="sz-notif-list__icon">
                        <i class="bi bi-bell-fill"></i>
                    </span>
                    <div class="flex-grow-1 min-w-0">
                        <div th:text="${n.message}"
                             th:classappend="${n.unread} ? 'fw-semibold'">message</div>
                        <div class="small text-secondary"
                             th:text="${n.createdAt != null
                                ? #temporals.format(n.createdAt, 'dd MMM yyyy · HH:mm') : ''}"></div>
                    </div>
                    <span th:if="${n.unread}" class="badge text-bg-primary align-self-center flex-shrink-0">New</span>
                </a>
            </div>

        </main>
    </div>
</div>

<nav th:replace="~{fragments/layout :: mobile-nav('notifications')}"></nav>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
