<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Notifications')}"></head>

<body>

    <div th:replace="~{fragments/layout :: skip-link}"></div>
<div class="d-flex sz-shell">

    <div th:replace="~{fragments/layout :: sidebar('notifications')}"></div>

    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">

        <nav th:replace="~{fragments/layout :: topbar('Notifications')}"></nav>

        <main class="sz-content has-mobile-nav p-3 p-md-4">

            <div th:replace="~{fragments/layout :: alerts}"></div>

            <nav sec:authorize="hasRole('ADMIN')"
                 th:replace="~{fragments/components :: breadcrumbs(
                @{/admin/dashboard}, 'Dashboard',
                null, null,
                'Notifications')}"></nav>
            <nav sec:authorize="hasRole('PROVIDER')"
                 th:replace="~{fragments/components :: breadcrumbs(
                @{/provider/dashboard}, 'Dashboard',
                null, null,
                'Notifications')}"></nav>
            <nav sec:authorize="hasRole('APPLICANT')"
                 th:replace="~{fragments/components :: breadcrumbs(
                @{/applicant/dashboard}, 'Dashboard',
                null, null,
                'Notifications')}"></nav>

            <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-3">
                <div>
                    <div th:replace="~{fragments/components :: page-header('Notifications', 'Application updates, deadline reminders, and profile alerts.')}"></div>
                    <p class="small text-secondary mb-0" th:if="${unreadCount > 0}">
                        <span class="fw-semibold text-primary" th:text="${unreadCount}">0</span> unread
                    </p>
                </div>
                <form th:if="${unreadCount > 0}"
                      th:action="@{/notifications/read-all}" method="post" class="m-0">
                    <input type="hidden" th:replace="~{fragments/layout :: csrf}">
                    <button class="btn btn-sm btn-outline-primary" type="submit">
                        <i class="bi bi-check2-all me-1"></i>Mark all read
                    </button>
                </form>
            </div>

            <div class="sz-filter-scroll" th:if="${!notificationTypes.isEmpty()}">
                <a th:href="@{/notifications}"
                   class="btn btn-sm"
                   th:classappend="${typeFilter == ''} ? 'btn-primary' : 'btn-outline-secondary'">
                    All
                </a>
                <a th:each="t : ${notificationTypes}"
                   th:href="@{/notifications(type=${t})}"
                   class="btn btn-sm"
                   th:classappend="${t == typeFilter} ? 'btn-primary' : 'btn-outline-secondary'"
                   th:text="${T(com.scholarzim.util.NotificationPresentation).label(t)}">Type</a>
            </div>

            <th:block th:if="${notifications.isEmpty() and typeFilter == ''}">
                <div th:replace="~{fragments/components :: empty-state(
                    'bi-bell', 'No notifications',
                    'You are all caught up. New alerts will appear here.',
                    null, null)}"></div>
            </th:block>
            <th:block th:if="${notifications.isEmpty() and typeFilter != ''}">
                <div th:replace="~{fragments/components :: empty-state(
                    'bi-bell', 'No matching notifications',
                    'Try another filter or check back later.',
                    @{/notifications}, 'Clear filter')}"></div>
            </th:block>

            <div th:if="${!notifications.isEmpty()}" class="sz-notif-list">
                <a th:each="n : ${notifications}"
                   th:href="@{/notifications/{id}/open(id=${n.notificationId})}"
                   class="sz-notif-list__item"
                   th:classappend="${n.unread} ? 'sz-notif-item--unread'">
                    <span th:replace="~{fragments/components :: notification-icon(${n.type})}"></span>
                    <div class="flex-grow-1 min-w-0">
                        <div class="d-flex flex-wrap align-items-center gap-2 mb-1">
                            <span class="badge rounded-pill sz-notif-type-badge"
                                  th:text="${T(com.scholarzim.util.NotificationPresentation).label(n.type)}">Type</span>
                            <span th:if="${n.unread}" class="badge text-bg-primary">New</span>
                        </div>
                        <div th:text="${n.message}"
                             th:classappend="${n.unread} ? 'fw-semibold'">message</div>
                        <div class="small text-secondary mt-1"
                             th:text="${n.createdAt != null
                                ? #temporals.format(n.createdAt, 'dd MMM yyyy · HH:mm') : ''}"></div>
                    </div>
                    <i class="bi bi-chevron-right text-secondary flex-shrink-0 align-self-center"></i>
                </a>
            </div>

        </main>
    </div>
</div>

<nav th:replace="~{fragments/layout :: mobile-nav('notifications')}" sec:authorize="hasRole('APPLICANT')"></nav>
<nav th:replace="~{fragments/layout :: provider-mobile-nav('messages')}" sec:authorize="hasRole('PROVIDER')"></nav>
<nav th:replace="~{fragments/layout :: admin-mobile-nav('dashboard')}" sec:authorize="hasRole('ADMIN')"></nav>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
