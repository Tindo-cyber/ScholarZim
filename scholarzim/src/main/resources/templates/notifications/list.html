<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="~{fragments/layout :: head('Notifications')}"></head>

<body>

<div class="d-flex sz-shell">

    <div th:replace="~{fragments/layout :: sidebar('')}"></div>

    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">

        <nav th:replace="~{fragments/layout :: topbar('Notifications')}"></nav>

        <main class="sz-content p-3 p-md-4">

            <div class="d-flex justify-content-end mb-3"
                 th:if="${!notifications.isEmpty()}">
                <form th:action="@{/notifications/read-all}" method="post">
                    <button class="btn btn-sm btn-outline-primary" type="submit">
                        <i class="bi bi-check2-all me-1"></i>Mark all read
                    </button>
                </form>
            </div>

            <div th:if="${notifications.isEmpty()}" class="alert alert-info rounded-4">
                <i class="bi bi-info-circle me-2"></i>You have no notifications.
            </div>

            <div th:if="${!notifications.isEmpty()}" class="card shadow-sm rounded-4">
                <ul class="list-group list-group-flush">
                    <a th:each="n : ${notifications}"
                       th:href="@{/notifications/{id}/open(id=${n.notificationId})}"
                       class="list-group-item list-group-item-action d-flex align-items-start gap-3 py-3"
                       th:classappend="${!n.read} ? 'bg-body-secondary'">
                        <i class="bi bi-bell-fill fs-5 text-primary"></i>
                        <div class="flex-grow-1">
                            <div th:text="${n.message}"
                                 th:classappend="${!n.read} ? 'fw-semibold'">message</div>
                            <div class="small text-secondary"
                                 th:text="${n.createdAt != null
                                    ? #temporals.format(n.createdAt, 'dd MMM yyyy HH:mm') : ''}"></div>
                        </div>
                        <span th:if="${!n.read}" class="badge text-bg-primary align-self-center">New</span>
                    </a>
                </ul>
            </div>

        </main>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
