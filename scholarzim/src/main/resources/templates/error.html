<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/layout :: head('Error')}"></head>

<body>

<div class="sz-auth">
    <div class="card sz-auth-card shadow-lg text-center">
        <div class="card-body p-4 p-md-5">

            <div class="display-1 mb-2"
                 th:classappend="${status == 403} ? 'text-warning' : (${status == 404} ? 'text-info' : 'text-danger')">
                <i class="bi"
                   th:classappend="${status == 403} ? 'bi-shield-lock'
                       : (${status == 404} ? 'bi-compass' : 'bi-exclamation-triangle')"></i>
            </div>

            <h1 class="h4 mb-2"
                th:text="${status == 403} ? 'Access denied'
                    : (${status == 404} ? 'Page not found' : 'Something went wrong')">
                Something went wrong
            </h1>

            <p class="text-secondary mb-1" th:if="${status}">
                Error code: <span th:text="${status}"></span>
            </p>
            <p class="text-secondary" th:if="${error}" th:text="${error}"></p>

            <p class="mb-4 text-secondary"
               th:if="${status == null}">
                Please try again, or head back to your dashboard.
            </p>

            <div class="d-flex justify-content-center gap-2 flex-wrap">
                <a class="btn btn-primary" th:href="@{/dashboard}">
                    <i class="bi bi-speedometer2 me-1"></i>Dashboard
                </a>
                <a class="btn btn-outline-secondary" th:href="@{/login}">
                    <i class="bi bi-box-arrow-in-right me-1"></i>Login
                </a>
            </div>

        </div>
    </div>
</div>

<th:block th:replace="~{fragments/layout :: scripts}"></th:block>

</body>
</html>
