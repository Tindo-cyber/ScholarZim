<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Account Security')}"></head>
<body>
<div class="d-flex sz-shell">
    <div th:replace="~{fragments/layout :: sidebar('profile')}"></div>
    <div class="flex-grow-1 min-w-0 d-flex flex-column sz-main">
        <nav th:replace="~{fragments/layout :: topbar('Security')}"></nav>
        <main class="sz-content p-3 p-md-4">
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="card sz-section-card mb-4">
                <div class="card-body p-4">
                    <h1 class="h5 fw-bold">Two-factor authentication (TOTP)</h1>
                    <p class="text-secondary">Add an authenticator app for extra account protection.</p>
                    <p class="small"><strong>Secret:</strong> <code th:text="${secret}">secret</code></p>
                    <p class="small text-break"><strong>Setup URI:</strong> <code th:text="${qrUri}">uri</code></p>
                    <form th:action="@{/account/security/enable-2fa}" method="post" class="row g-2 mt-3">
                        <input type="hidden" name="secret" th:value="${secret}">
                        <div class="col-md-4">
                            <input class="form-control" name="code" placeholder="6-digit code" required>
                        </div>
                        <div class="col-md-4">
                            <button class="btn btn-primary" type="submit">Enable 2FA</button>
                        </div>
                    </form>
                    <form th:action="@{/account/security/disable-2fa}" method="post" class="mt-3">
                        <button class="btn btn-outline-danger btn-sm" type="submit">Disable 2FA</button>
                    </form>
                </div>
            </div>
            <div class="card sz-section-card">
                <div class="card-body p-4">
                    <h2 class="h6 fw-bold">Data export</h2>
                    <p class="text-secondary small">Download a copy of your account and application data.</p>
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/account/export-data}">Export my data</a>
                </div>
            </div>
        </main>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
