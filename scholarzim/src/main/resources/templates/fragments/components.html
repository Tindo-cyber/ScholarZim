<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<div th:fragment="scholarship-card(opportunity, showApply, withApplyBtn)"
     class="sz-opp-card sz-animate-in">
    <div class="sz-opp-card__header">
        <div class="sz-opp-title" th:text="${opportunity.title}">Title</div>
        <div class="sz-opp-provider">
            <i class="bi bi-building"></i>
            <span th:text="${opportunity.providerName}">Provider</span>
        </div>
    </div>
    <div class="sz-opp-card__body">
        <p class="sz-opp-desc" th:if="${opportunity.description}" th:text="${opportunity.description}">Desc</p>
        <div class="sz-opp-meta">
            <span class="sz-badge sz-badge--funding" th:if="${opportunity.fundingType}" th:text="${opportunity.fundingType}">Full</span>
            <span class="sz-badge sz-badge--level" th:if="${opportunity.educationLevel}" th:text="${opportunity.educationLevel}">Level</span>
            <span class="sz-badge sz-badge--country" th:if="${opportunity.country}" th:text="${opportunity.country}">Country</span>
        </div>
    </div>
    <div class="sz-opp-card__footer">
        <span class="sz-deadline" th:if="${opportunity.deadline != null}"
              th:attr="data-deadline=${opportunity.deadline}">Deadline</span>
        <span th:if="${opportunity.deadline == null}" class="small text-secondary">Rolling deadline</span>
        <div class="d-flex gap-2">
            <a th:if="${showApply == null or showApply}"
               th:href="@{/scholarships/{id}(id=${opportunity.opportunityId})}"
               class="btn btn-outline-primary btn-sm">Details</a>
            <a th:if="${withApplyBtn}"
               th:href="@{/apply/{id}(id=${opportunity.opportunityId})}"
               class="btn btn-primary btn-sm">
                <i class="bi bi-send me-1"></i>Apply
            </a>
        </div>
    </div>
</div>

<!-- Scored recommendation card -->
<div th:fragment="scored-card(scored)" class="sz-opp-card sz-animate-in">
    <div class="sz-opp-card__header">
        <div class="d-flex justify-content-between align-items-start gap-2">
            <div class="sz-opp-title" th:text="${scored.opportunity.title}">Title</div>
            <span class="badge text-bg-success flex-shrink-0"
                  th:text="${scored.matchScore} + '%'">80%</span>
        </div>
        <div class="sz-opp-provider">
            <i class="bi bi-building"></i>
            <span th:text="${scored.opportunity.providerName}">Provider</span>
        </div>
    </div>
    <div class="sz-opp-card__body">
        <div class="mb-2">
            <div class="d-flex justify-content-between small mb-1">
                <span class="text-secondary">ScholarFit score</span>
                <span class="fw-bold text-success" th:text="${scored.matchScore} + '%'">0%</span>
            </div>
            <div class="sz-match-bar">
                <div class="sz-match-bar__fill" th:style="'width:' + ${scored.matchScore} + '%'"></div>
            </div>
            <p class="small text-secondary mt-2 mb-0" th:if="${scored.breakdown != null}"
               th:text="${scored.breakdown.explanation}">Breakdown</p>
        </div>
        <div class="sz-opp-meta">
            <span class="sz-badge sz-badge--level" th:text="${scored.opportunity.educationLevel}">Level</span>
            <span class="sz-badge sz-badge--country" th:text="${scored.opportunity.country}">Country</span>
        </div>
    </div>
    <div class="sz-opp-card__footer">
        <span class="sz-deadline" th:if="${scored.opportunity.deadline != null}"
              th:attr="data-deadline=${scored.opportunity.deadline}">Deadline</span>
        <a th:href="@{/apply/{id}(id=${scored.opportunity.opportunityId})}" class="btn btn-primary btn-sm">
            <i class="bi bi-send me-1"></i>Apply
        </a>
    </div>
</div>

<div th:fragment="page-header(title, subtitle)" class="sz-page-header sz-animate-in mb-4">
    <h1 th:text="${title}">Title</h1>
    <p class="text-secondary mb-0" th:if="${subtitle}" th:text="${subtitle}">Subtitle</p>
</div>

<div th:fragment="empty-state(icon, title, message, actionUrl, actionLabel)" class="sz-empty sz-animate-in">
    <div class="sz-empty-icon"><i class="bi" th:classappend="${icon}"></i></div>
    <h3 class="h5 fw-bold" th:text="${title}">Title</h3>
    <p class="text-secondary mb-3" th:text="${message}">Message</p>
    <a th:if="${actionUrl}" th:href="${actionUrl}" class="btn btn-primary btn-sm" th:text="${actionLabel}">Action</a>
</div>

<div th:fragment="stat-card(icon, value, label, color)" class="card sz-stat-card shadow-sm h-100">
    <div class="card-body d-flex align-items-center gap-3">
        <div class="sz-stat-icon" th:classappend="${color}">
            <i class="bi" th:classappend="${icon}"></i>
        </div>
        <div>
            <div class="sz-stat-value" th:text="${value}">0</div>
            <div class="small text-secondary" th:text="${label}">Label</div>
        </div>
    </div>
</div>

<span th:fragment="status-badge(status)"
      class="badge rounded-pill"
      th:classappend="${status == 'ACTIVE' or status == 'APPROVED'} ? 'text-bg-success'
          : (${status == 'SUSPENDED' or status == 'REJECTED'} ? 'text-bg-danger'
          : (${status == 'PENDING_APPROVAL' or status == 'PENDING' or status == 'SUBMITTED'} ? 'text-bg-warning text-dark'
          : 'text-bg-secondary'))"
      th:text="${status}">STATUS</span>

</html>
