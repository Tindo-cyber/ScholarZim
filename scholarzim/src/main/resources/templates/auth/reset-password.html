<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/public-layout :: head('Reset Password')}"></head>
<body class="sz-landing">

<div th:replace="~{fragments/public-layout :: skip-link}"></div>
<header th:replace="~{fragments/public-layout :: navbar}"></header>

<main id="main-content" tabindex="-1" class="sz-landing-main sz-auth-public">
    <div class="container sz-container py-4 py-md-5">
        <div class="sz-auth-public__inner">
            <div class="sz-auth-card">
                <div class="text-center mb-4">
                    <div class="sz-auth-brand-icon mx-auto"><i class="bi bi-shield-lock"></i></div>
                    <div class="sz-auth-brand h4 mb-1">Choose a new password</div>
                </div>
                <form th:object="${resetRequest}"
                      th:action="@{/reset-password/{token}(token=${resetRequest.token})}" method="post">
                    <div class="alert alert-danger rounded-3" th:if="${#fields.hasGlobalErrors()}">
                        <p class="mb-0" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New password</label>
                        <input type="password" class="form-control" th:field="*{password}"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        <div class="form-text">At least 8 characters with a letter and number.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Confirm password</label>
                        <input type="password" class="form-control" th:field="*{confirmPassword}">
                    </div>
                    <div class="d-grid mt-4">
                        <button class="btn btn-primary sz-btn-landing-primary btn-lg" type="submit">Update password</button>
                    </div>
                </form>
                <p class="text-center sz-auth-muted mt-4 mb-0">
                    <a th:href="@{/login}">Back to sign in</a>
                </p>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/public-layout :: public-footer}"></footer>
<th:block th:replace="~{fragments/public-layout :: scripts}"></th:block>
</body>
</html>
