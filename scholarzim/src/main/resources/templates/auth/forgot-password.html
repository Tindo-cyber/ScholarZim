<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot Password')}"></head>
<body class="sz-auth-page">
<header th:replace="~{fragments/layout :: auth-topbar}"></header>
<div class="sz-auth-wrap">
    <div class="sz-auth-panel sz-auth-panel--solo mx-auto" style="max-width:480px;width:100%;">
        <div class="sz-auth-card">
            <div class="text-center mb-4">
                <div class="sz-auth-brand-icon mx-auto"><i class="bi bi-key"></i></div>
                <div class="sz-auth-brand h4 mb-1">Reset password</div>
                <p class="text-secondary mb-0">Enter your email and we'll send a reset link.</p>
            </div>
            <form th:action="@{/forgot-password}" method="post" th:object="${forgotRequest}">
                <input type="hidden" th:replace="~{fragments/layout :: csrf}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email address</label>
                    <input type="email" class="form-control" th:field="*{email}"
                           th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>
                <div class="d-grid mt-4">
                    <button class="btn btn-primary btn-lg" type="submit">Send reset link</button>
                </div>
            </form>
            <p class="text-center text-secondary mt-4 mb-0">
                <a th:href="@{/login}">Back to sign in</a>
            </p>
        </div>
    </div>
</div>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
