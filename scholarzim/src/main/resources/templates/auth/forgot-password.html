<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/public-layout :: head('Forgot Password')}"></head>
<body class="sz-landing">

<div th:replace="~{fragments/public-layout :: skip-link}"></div>
<header th:replace="~{fragments/public-layout :: navbar}"></header>

<main id="main-content" tabindex="-1" class="sz-landing-main sz-auth-public">
    <div class="container sz-container py-4 py-md-5">
        <div class="sz-auth-public__inner">
            <div class="sz-auth-card">
                <div class="text-center mb-4">
                    <div class="sz-auth-brand-icon mx-auto"><i class="bi bi-key"></i></div>
                    <div class="sz-auth-brand h4 mb-1">Reset password</div>
                    <p class="sz-auth-muted mb-0">Enter your email and we'll send a reset link.</p>
                </div>
                <form th:action="@{/forgot-password}" method="post" th:object="${forgotRequest}">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Email address</label>
                        <input type="email" class="form-control" th:field="*{email}"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <div class="d-grid mt-4">
                        <button class="btn btn-primary sz-btn-landing-primary btn-lg" type="submit">Send reset link</button>
                    </div>
                </form>
                <p class="text-center sz-auth-muted mt-4 mb-0">
                    <a th:href="@{/login}">Back to sign in</a>
                </p>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/public-layout :: public-footer}"></footer>
<th:block th:replace="~{fragments/public-layout :: scripts}"></th:block>
</body>
</html>
