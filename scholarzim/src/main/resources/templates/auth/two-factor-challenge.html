<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Two-factor verification')}"></head>
<body class="sz-auth-page">
<header th:replace="~{fragments/layout :: auth-topbar}"></header>
<div class="sz-auth-wrap">
    <div class="sz-auth-hero">
        <div>
            <h1>Verify your identity</h1>
            <p class="lead">Enter the 6-digit code from your authenticator app to continue.</p>
        </div>
    </div>
    <div class="sz-auth-panel">
        <div class="sz-auth-card">
            <h2 class="h5 mb-3">Two-factor authentication</h2>
            <p class="text-secondary small mb-3">
                Signed in as <strong th:text="${email}">user@example.com</strong>
            </p>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
            <form th:action="@{/login/2fa-challenge}" method="post" class="vstack gap-3">
                <input type="hidden" th:replace="~{fragments/layout :: csrf}">
                <div>
                    <label class="form-label" for="code">Verification code</label>
                    <input class="form-control form-control-lg" id="code" name="code"
                           inputmode="numeric" pattern="[0-9]{6}" maxlength="6"
                           placeholder="000000" required autofocus>
                </div>
                <button class="btn btn-primary w-100" type="submit">Continue</button>
            </form>
            <form th:action="@{/logout}" method="post" class="mt-3">
                <input type="hidden" th:replace="~{fragments/layout :: csrf}">
                <button class="btn btn-link btn-sm p-0" type="submit">Sign out</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
