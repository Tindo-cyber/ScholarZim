spring.application.name=scholarzim
spring.datasource.url=jdbc:mysql://localhost:3306/scholarzim
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

scholarzim.demo.seed=true
scholarzim.upload.dir=uploads
scholarzim.upload.provider.retention-days=365

# Mail (Mailhog local: docker-compose)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
scholarzim.mail.from=noreply@scholarzim.co.zw
scholarzim.app.base-url=http://localhost:8080

# Rate limiting
scholarzim.rate-limit.login-per-minute=10
scholarzim.rate-limit.provider-register-per-hour=5
scholarzim.security.2fa.enabled=false

logging.level.com.scholarzim=INFO
logging.level.org.springframework.security=WARN
server.error.include-message=never
server.error.whitelabel.enabled=false

management.endpoints.web.exposure.include=health,info
springdoc.swagger-ui.path=/swagger-ui.html

# Always serve fresh CSS/JS during development (prevents "no visual change" from browser cache)
spring.web.resources.cache.period=0
spring.web.resources.chain.cache=false
