server.port=${PORT:8080}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
# FYP / Render: seed demo users (including admin@scholarzim.co.zw) unless explicitly disabled
scholarzim.demo.seed=${SCHOLARZIM_DEMO_SEED:true}
logging.level.com.scholarzim=INFO
logging.level.org.springframework.security=WARN

management.endpoints.web.exposure.include=health

# Mail is optional on Render — do not mark the app unhealthy when SMTP is unset
management.health.mail.enabled=false
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.datasource.url=${SCHOLARZIM_DB_URL:jdbc:mysql://localhost:3306/scholarzim}
spring.datasource.username=${SCHOLARZIM_DB_USER:root}
spring.datasource.password=${SCHOLARZIM_DB_PASSWORD:root}

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

scholarzim.app.base-url=${SCHOLARZIM_APP_BASE_URL:https://www.scholarzim.com}
scholarzim.mail.from=${SCHOLARZIM_MAIL_FROM:noreply@scholarzim.com}

scholarzim.upload.dir=${SCHOLARZIM_UPLOAD_DIR:uploads}

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=${SCHOLARZIM_SESSION_COOKIE_SECURE:true}

spring.web.resources.cache.period=31536000
spring.web.resources.chain.cache=true
spring.thymeleaf.cache=true
scholarzim.assets.long-cache=true
scholarzim.assets.cache-purge=false
