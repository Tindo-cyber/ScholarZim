# Demo profile — seeded data for viva and presentations
scholarzim.demo.seed=true

spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

logging.level.com.scholarzim=INFO

spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.properties.mail.smtp.auth=false

scholarzim.app.base-url=${SCHOLARZIM_APP_BASE_URL:http://localhost:8080}
scholarzim.upload.dir=${SCHOLARZIM_UPLOAD_DIR:uploads}
