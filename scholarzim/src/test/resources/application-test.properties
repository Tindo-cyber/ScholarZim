spring.application.name=scholarzim-test
spring.datasource.url=jdbc:h2:mem:scholarzim-${random.uuid};MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
scholarzim.demo.seed=false
scholarzim.upload.dir=target/test-uploads
scholarzim.rate-limit.provider-register-per-hour=100
scholarzim.auth.email-verification-required=false
