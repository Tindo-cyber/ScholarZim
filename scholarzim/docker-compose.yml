services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scholarzim
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: demo
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/scholarzim?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      SCHOLARZIM_APP_BASE_URL: http://localhost:8080
      SCHOLARZIM_UPLOAD_DIR: /app/uploads
    volumes:
      - upload_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  mysql_data:
  upload_data:
