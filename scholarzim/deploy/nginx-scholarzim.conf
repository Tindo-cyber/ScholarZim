# Nginx reverse proxy for ScholarZim
# Place at: /etc/nginx/sites-available/scholarzim.com
# Then: sudo ln -s /etc/nginx/sites-available/scholarzim.com /etc/nginx/sites-enabled/
# Obtain TLS first (or use certbot --nginx after this file exists):
#   sudo certbot --nginx -d www.scholarzim.com -d scholarzim.com

server {
    listen 80;
    listen [::]:80;
    server_name scholarzim.com www.scholarzim.com;

    # Certbot will replace this with HTTPS redirects when using --nginx
    location / {
        return 301 https://www.scholarzim.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name scholarzim.com;

    # TLS paths filled by Certbot, or set manually:
    # ssl_certificate     /etc/letsencrypt/live/www.scholarzim.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.scholarzim.com/privkey.pem;

    return 301 https://www.scholarzim.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.scholarzim.com;

    # ssl_certificate     /etc/letsencrypt/live/www.scholarzim.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/www.scholarzim.com/privkey.pem;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 120s;
    }
}
