services:
  - type: web
    name: scholarzim
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SCHOLARZIM_SESSION_COOKIE_SECURE
        value: "true"
      # FYP demo: set to "true" in the Render dashboard to seed sample users/scholarships
      - key: SCHOLARZIM_DEMO_SEED
        value: "true"
      - key: SCHOLARZIM_DB_URL
        sync: false
      - key: SCHOLARZIM_DB_USER
        sync: false
      - key: SCHOLARZIM_DB_PASSWORD
        sync: false
      - key: SCHOLARZIM_APP_BASE_URL
        sync: false
      - key: SCHOLARZIM_MAIL_FROM
        value: noreply@scholarzim.com
